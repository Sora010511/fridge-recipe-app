<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>冷蔵庫レシピ提案</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="app">
  <header class="app-header">
    <h1>冷蔵庫レシピ提案</h1>
    <p class="subtitle">今ある食材でつくれるレシピを探そう</p>
  </header>

  <section class="ingredients-section">
    <h2>食材リスト</h2>
    <form id="ingredient-form" class="ingredient-form">
      <input
        type="text"
        id="ingredient-input"
        placeholder="例：豚肉、玉ねぎ"
        autocomplete="off"
        required
      />
      <button type="submit">追加</button>
    </form>
    <ul id="ingredient-list" class="ingredient-list"></ul>
  </section>

  <section class="recipes-section">
    <div class="recipes-header">
      <h2>レシピ提案</h2>
      <button type="button" id="search-recipes-btn">レシピを探す</button>
    </div>
    <p id="recipes-message" class="recipes-message"></p>
    <div id="recipe-list" class="recipe-list"></div>
  </section>

  <footer class="app-footer">
    <p>レシピ提供：<a href="https://recipe.rakuten.co.jp/" target="_blank" rel="noopener">楽天レシピ</a></p>
  </footer>
</div>
<script src="js/app.js"></script>
</body>
</html>
